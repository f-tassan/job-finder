# job-finder — full stack. `cp .env.example .env`, fill it, then `docker compose up -d --build`.
# Services: db (postgres+pgvector), redis, api (FastAPI), worker (Celery),
# browser-worker (Celery+Playwright), beat (scheduler), web (Next.js), caddy (HTTPS proxy).

name: job-finder

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - files:/data/files          # uploaded CVs + generated documents (per-user subpaths)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build: ./api
    command: celery -A app.tasks.celery_app worker -Q default -l info
    env_file: .env
    depends_on:
      api: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - files:/data/files
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  browser-worker:
    # Playwright image ships the browser system deps; install Python app deps on top.
    build:
      context: ./api
      dockerfile: Dockerfile.browser
    command: celery -A app.tasks.celery_app worker -Q browser -l info --concurrency=1
    env_file: .env
    depends_on:
      api: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - files:/data/files
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  beat:
    build: ./api
    command: celery -A app.tasks.celery_app beat -l info
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    build: ./web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN}            # consumed by {$DOMAIN} in the Caddyfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2019/config/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  files:
  caddy_data:
  caddy_config:
